name: Trying out
on: workflow_dispatch
jobs:
  first:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Installs Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      
        
          
